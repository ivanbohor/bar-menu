<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Menú - Bar español</title>
    <link rel="icon" href="https://i.postimg.cc/HkfvptWY/bar-logo-OPTM.png" type="image/png">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@600&family=Kalam:wght@700&display=swap" rel="stylesheet">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

    <style>
        :root {
            --bg-color: #121212;
            --text-color: #e0e0e0;
            --primary-accent: #FFC857;
            --border-color: #333;
        }
        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Inter', sans-serif;
            overflow-x: hidden;
        }
        .header-container { display: flex; flex-direction: column; justify-content: center; align-items: center; gap: 0.25rem; margin-bottom: 2rem; }
        .header-logo { height: 140px; margin-bottom: 0.5rem; border-radius: 16px; }
        .main-title { font-family: 'Playfair Display', serif; font-size: 2.25rem; font-weight: 700; color: #ffffff; letter-spacing: 0.1em; text-shadow: 1px 1px 3px rgba(0,0,0,0.3); }
        .header-subtitle { font-family: 'Inter', sans-serif; font-size: 0.9rem; font-weight: 400; color: var(--text-color); letter-spacing: 0.05em; margin-top: -0.25rem; }
        .menu-title { font-family: 'Playfair Display', serif; font-size: 2.2rem; font-weight: 700; color: #ffffff; letter-spacing: 0.08em; text-align: center; margin-top: 1rem; margin-bottom: 1.5rem; }
        .hoy-title { font-family: 'Playfair Display', serif; font-size: 1.8rem; font-style: italic; color: var(--primary-accent); text-align: center; margin-bottom: 1.2rem; }
        .category-separator { text-align: center; margin-top: 2.5rem; margin-bottom: 1.5rem; }
        .category-separator::after { content: ''; display: block; width: 150px; height: 20px; margin: 0.5rem auto 0; background-image: url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 10"><path d="M0 5 Q 25 0, 50 5 T 100 5" stroke="%23FFC857" stroke-width="1" fill="none" /></svg>'); background-repeat: no-repeat; background-position: center; }
        .category-title { font-family: 'Playfair Display', serif; font-size: 1.75rem; font-weight: 700; color: var(--primary-accent); }
        .menu-item { border-bottom: 1px solid var(--border-color); }
        .menu-item:last-child { border-bottom: none; }
        .header-text { border: 1px solid var(--border-color); background-color: rgba(30, 30, 30, 0.5); padding: 1rem; border-radius: 0.75rem; font-size: 0.95rem; line-height: 1.6; text-align: center; color: #fafafa; }
        .wapp-button { display: inline-block; color: #25D366; font-weight: 700; font-size: 1.05rem; text-decoration: underline; transition: opacity 0.2s; }
        .wapp-button:hover { opacity: 0.8; }
        .footer-link { text-decoration: underline; color: #ffffff; font-weight: 600; transition: color 0.2s; }
        .footer-link:hover { color: var(--primary-accent); }
        
        /* Estilos Pizarra */
        .fuente-tiza { font-family: 'Kalam', cursive; text-shadow: 2px 2px 4px rgba(0,0,0,0.9); }
        .fuente-firma { font-family: 'Caveat', cursive; text-shadow: 1px 1px 3px rgba(0,0,0,0.8); }
    </style>
</head>
<body class="antialiased relative">

    <div class="container mx-auto p-4 max-w-2xl">
        <header>
            <div class="header-container">
                <img src="https://i.postimg.cc/HkfvptWY/bar-logo-OPTM.png" alt="Logo Bar Español" class="header-logo">
                <h1 class="main-title">Bar Español</h1>
                <p class="header-subtitle">Desde 1981</p>
            </div>
            <div id="home-text-container" class="mt-4 mb-6 text-gray-300"></div>
        </header>

        <main id="menu-container">
            <h3 id="titulo-hoy" class="hoy-title" style="display: none;">Platos del día</h3>
            
            <div id="menu-dia-container" class="w-full grid grid-cols-2 gap-3 mb-2 px-1"></div>
            
            <div id="contenedor-descarga-global" class="text-center w-full mb-8 mt-4" style="display: none;">
                <button id="btnDescargarPizarras" class="text-sm text-gray-400 font-semibold underline hover:text-white transition-colors cursor-pointer flex items-center justify-center mx-auto">
                    <i class="bi bi-download mr-1"></i> Descargar Pizarras
                </button>
            </div>
            
            <h2 id="titulo-menu-resto" class="menu-title" style="display: none;">Menú</h2>

            <div id="promo-text-container" class="mb-8 mt-2 text-gray-300 px-2 w-full"></div>
            
            <div id="resto-menu-container"></div>
        </main>

        <footer class="text-center mt-12 text-gray-500 text-sm pb-8">
            <p class="text-xs text-white mb-2">
                Hecho por Vanto. ¿Queres tambien un menu editable/QR para tu comercio? 
                <a href="https://wa.me/541123920404?text=Hola,%20me%20interesa%20un%20menu%20QR" target="_blank" rel="noopener noreferrer" class="footer-link">Hablemos</a>
            </p>
            <p>© 2026 Bar español. Todos los derechos reservados.</p>
        </footer>
    </div>

    <div id="plantillas-ocultas" style="position: absolute; left: -9999px; top: 0;"></div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const googleSheetURL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSMWnEuTjdtdA0g2eXvOPJu5AzgbTnbnrkimQlN_BrnT3dmu5ze1Oz-cuCaEp2GfdSNPqVbxrG8AYUz/pub?output=csv';
            
            // --- TUS IMÁGENES ALOJADAS EN POSTIMG ---
            const IMAGEN_PLANTILLA_URL = 'https://i.postimg.cc/Px1J9hBV/Whats-App-Image-2026-03-03-at-10-52-45.jpg'; 
            
            // Links oficiales subidos por vos:
            const ICONO_PEDIDOSYA = 'https://i.postimg.cc/httdFbYg/pedidos-ya-logo-png-seeklogo-369550.png';
            const ICONO_RAPPI = 'https://i.postimg.cc/FRMyNdLR/images.png';         
            const ICONO_MERCADOPAGO = 'https://i.postimg.cc/Qx569s80/merca-rand-mp.webp'; 

            const menuDiaContainer = document.getElementById('menu-dia-container');
            const restoMenuContainer = document.getElementById('resto-menu-container');
            const plantillasOcultas = document.getElementById('plantillas-ocultas');
            const tituloHoy = document.getElementById('titulo-hoy');
            const tituloMenuResto = document.getElementById('titulo-menu-resto');
            const contenedorDescargaGlobal = document.getElementById('contenedor-descarga-global');

            const CACHE_KEY = 'barEspanol_menuData';
            const CACHE_TIME_KEY = 'barEspanol_menuTimestamp';
            const CACHE_DURATION_MS = 15 * 60 * 1000; 

            fetchMenuData();

            async function fetchMenuData() {
                restoMenuContainer.innerHTML = `<p class="text-center text-gray-400">Cargando menú...</p>`;
                try {
                    const now = new Date().getTime();
                    const cachedData = sessionStorage.getItem(CACHE_KEY);
                    const cachedTimestamp = sessionStorage.getItem(CACHE_TIME_KEY);

                    if (cachedData && cachedTimestamp && (now - parseInt(cachedTimestamp)) < CACHE_DURATION_MS) {
                        const { items, promoText, principalText, segundoText } = JSON.parse(cachedData);
                        renderHeaderText(promoText, principalText, segundoText);
                        renderMenu(items);
                        return; 
                    }

                    const urlConCacheBuster = `${googleSheetURL}&timestamp=${now}`;
                    const response = await fetch(urlConCacheBuster);
                    if (!response.ok) throw new Error('No se pudo cargar la información.');
                    
                    let csvText = await response.text();
                    csvText = csvText.replace(/^\uFEFF/, '');
                    
                    const { items, promoText, principalText, segundoText } = parseCSV(csvText);
                    
                    sessionStorage.setItem(CACHE_KEY, JSON.stringify({ items, promoText, principalText, segundoText }));
                    sessionStorage.setItem(CACHE_TIME_KEY, now.toString());

                    renderHeaderText(promoText, principalText, segundoText);
                    renderMenu(items);

                } catch (error) {
                    restoMenuContainer.innerHTML = `<p class="text-center text-red-500 font-bold">${error.message}</p>`;
                }
            }

            function parseCSV(text) {
                const lines = text.trim().split(/\r?\n/);
                const headers = lines[0].split(',').map(h => h.trim().toLowerCase().replace(/"/g, ''));
                
                const nameIndex = headers.indexOf('nombre');
                const priceIndex = headers.indexOf('precio');
                const categoryIndex = headers.indexOf('categoria');
                const descriptionIndex = headers.indexOf('descripcion');
                const promoIndex = headers.indexOf('promo_text');
                const publicadoIndex = headers.indexOf('publicado_web');
                const principalIndex = headers.indexOf('principalhome_text');
                const segundoIndex = headers.indexOf('segundohome_text');
                
                const parseCsvLine = (line) => { 
                    const values = []; let current = ''; let inQuotes = false; 
                    for (const char of line) { 
                        if (char === '"' && !inQuotes) { inQuotes = true; } 
                        else if (char === '"' && inQuotes) { inQuotes = false; } 
                        else if (char === ',' && !inQuotes) { values.push(current); current = ''; } 
                        else { current += char; } 
                    } 
                    values.push(current); return values.map(v => v.trim()); 
                };
                
                const firstDataLineValues = lines.length > 1 ? parseCsvLine(lines[1]) : [];
                const promoText = promoIndex !== -1 ? firstDataLineValues[promoIndex] : '';
                const principalText = principalIndex !== -1 ? firstDataLineValues[principalIndex] : '';
                const segundoText = segundoIndex !== -1 ? firstDataLineValues[segundoIndex] : '';
                
                const items = lines.slice(1).map(line => { 
                    const values = parseCsvLine(line); 
                    const nombre = values[nameIndex] || ''; 
                    const precio = parseFloat(values[priceIndex]); 
                    const categoria = values[categoryIndex] || 'Varios'; 
                    const descripcion = values[descriptionIndex] || ''; 
                    const publicado = publicadoIndex !== -1 ? values[publicadoIndex]?.toLowerCase() : ''; 
                    if (nombre && !isNaN(precio)) return { nombre, precio, categoria, descripcion, publicado_web: publicado }; 
                    return null; 
                }).filter(item => item && item.publicado_web !== 'x');
                
                return { items, promoText, principalText, segundoText };
            }
            
            function renderHeaderText(promo, principal, segundo) {
                const promoContainer = document.getElementById('promo-text-container');
                const homeContainer = document.getElementById('home-text-container');
                
                if (promo) {
                    let textoFinalPromo = promo;
                    if(textoFinalPromo.includes('Plato especial')) {
                        textoFinalPromo = "Precios de lista. Todos los medios de pago 💳|10% de Descuento abonando en EFECTIVO 💸";
                    }
                    promoContainer.innerHTML = `<div class="header-text">${textoFinalPromo.replace(/\|/g, '<br>')}</div>`;
                }

                if (principal || segundo) {
                    let htmlContent = '<div class="header-text">';
                    if (principal) {
                        principal.split('|').forEach(part => {
                            const currentPart = part.trim();
                            const match = currentPart.match(/(\d{10,})/);
                            if (match && currentPart.toLowerCase().includes('whatsapp')) {
                                htmlContent += `<p class="mb-2">${currentPart.replace(/whatsapp/i, `<a href="https://wa.me/54${match[0]}" target="_blank" class="wapp-button">Whatsapp</a>`)}</p>`;
                            } else {
                                htmlContent += `<p class="mb-2">${currentPart}</p>`;
                            }
                        });
                    }
                    
                    if (segundo) {
                        let appsHtml = '<div class="flex flex-wrap justify-center items-center gap-4 mt-4">';
                        segundo.split('|').forEach(part => {
                            const match = part.trim().match(/\[([^\]]+)\]\((https?:\/\/[^\)]+)\)/);
                            if (match) {
                                const [_, brand, url] = match;
                                const brandLower = brand.toLowerCase();
                                
                                let iconUrl = '';
                                if (brandLower.includes('peya') || brandLower.includes('pedido')) {
                                    iconUrl = ICONO_PEDIDOSYA;
                                } else if (brandLower.includes('rappi')) {
                                    iconUrl = ICONO_RAPPI;
                                } else if (brandLower.includes('mp') || brandLower.includes('mercado')) {
                                    iconUrl = ICONO_MERCADOPAGO;
                                }

                                if (iconUrl) {
                                    appsHtml += `
                                        <a href="${url}" target="_blank" class="transition-transform hover:scale-110">
                                            <img src="${iconUrl}" alt="${brand}" class="h-10 md:h-12 w-auto object-contain rounded-md shadow-sm bg-white p-1">
                                        </a>`;
                                } else {
                                    appsHtml += `<a href="${url}" target="_blank" class="text-white underline font-semibold">${brand}</a>`;
                                }
                            }
                        });
                        htmlContent += appsHtml + '</div>';
                    }
                    homeContainer.innerHTML = htmlContent + '</div>';
                }
            }
            
            function calcularPrecioMenu(precioNeto) {
                const precioBruto = precioNeto / 0.9;
                const resto = Math.floor(precioBruto) % 100;
                const base = Math.floor(precioBruto / 100) * 100;
                if (resto > 50) return base + 100;
                if (resto > 0) return base + 50;
                return base;
            }

            function renderMenu(items) {
                menuDiaContainer.innerHTML = '';
                restoMenuContainer.innerHTML = '';
                plantillasOcultas.innerHTML = '';
                tituloHoy.style.display = 'none';
                tituloMenuResto.style.display = 'none';
                contenedorDescargaGlobal.style.display = 'none';

                if (items.length === 0) {
                    restoMenuContainer.innerHTML = `<p class="text-center text-gray-400">No hay items en el menú para mostrar.</p>`;
                    return;
                }

                const menuDiaItems = [];
                const regularItems = [];

                items.forEach(item => {
                    if (item.nombre.includes('*MENU DIA*')) {
                        item.nombreLimpio = item.nombre.replace('*MENU DIA*', '').trim();
                        menuDiaItems.push(item);
                    } else {
                        item.nombreLimpio = item.nombre;
                        regularItems.push(item);
                    }
                });
                
                // --- 1. DIBUJAR LAS PIZARRAS ---
                if (menuDiaItems.length > 0) {
                    tituloHoy.style.display = 'block'; 
                    contenedorDescargaGlobal.style.display = 'block'; 
                    
                    const chunks = [];
                    for (let i = 0; i < menuDiaItems.length; i += 2) chunks.push(menuDiaItems.slice(i, i + 2));

                    chunks.forEach((chunk, index) => {
                        let platosHtmlWeb = '';
                        let platosHtmlDescarga = '';
                        
                        chunk.forEach(plato => {
                            // AQUÍ ESTÁ LA MAGIA: El menú del día ya no usa calcularPrecioMenu().
                            // Toma el precio en efectivo directo del Excel.
                            const precioCrudo = plato.precio; 
                            
                            platosHtmlWeb += `
                                <div class="mb-2 w-full px-1">
                                    <div class="text-[1.1rem] leading-tight text-white font-bold tracking-wide break-words">${plato.nombreLimpio}</div>
                                    <div class="text-[1.1rem] text-[#FFC857] mt-0.5 font-bold">$${precioCrudo.toLocaleString('es-AR')}</div>
                                </div>
                            `;
                            
                            platosHtmlDescarga += `
                                <div class="mb-6 w-full px-2">
                                    <div class="text-[2.2rem] leading-tight text-white font-bold tracking-wide break-words">${plato.nombreLimpio}</div>
                                    <div class="text-[1.8rem] text-[#FFC857] mt-2 font-bold">$${precioCrudo.toLocaleString('es-AR')}</div>
                                </div>
                            `;
                        });

                        menuDiaContainer.innerHTML += `
                            <div class="w-full min-h-[140px] rounded-xl shadow-lg border border-gray-700 relative flex flex-col items-center justify-center p-2 text-center fuente-tiza overflow-hidden" style="background-image: url('${IMAGEN_PLANTILLA_URL}'); background-size: 350%; background-position: center;">
                                <div class="absolute inset-0 bg-black bg-opacity-50 rounded-xl z-0"></div> 
                                <div class="relative z-10 w-full flex flex-col items-center justify-center flex-grow">
                                    ${platosHtmlWeb}
                                </div>
                                <div class="relative z-10 w-full mt-1">
                                    <span class="text-gray-300 text-[0.65rem] tracking-wide fuente-firma">precio efectivo</span>
                                </div>
                            </div>
                        `;

                        plantillasOcultas.innerHTML += `
                            <div class="relative w-[400px] h-[711px] tarjeta-oculta" id="tarjeta-oculta-${index}">
                                <img src="${IMAGEN_PLANTILLA_URL}" crossorigin="anonymous" class="absolute inset-0 w-full h-full object-cover z-0">
                                <div class="relative z-10 flex flex-col items-center justify-center w-full h-full pt-[35%] pb-[30%] text-center fuente-tiza">
                                    ${platosHtmlDescarga}
                                </div>
                                <div class="absolute bottom-[16%] w-full text-center z-10 px-4">
                                    <span class="text-[#e0e0e0] text-xl tracking-wide fuente-firma">* Promoción válida abonando en efectivo</span>
                                </div>
                            </div>
                        `;
                    });

                    const btnDescargarPizarras = document.getElementById('btnDescargarPizarras');
                    if(btnDescargarPizarras) {
                        const nuevoBtn = btnDescargarPizarras.cloneNode(true);
                        btnDescargarPizarras.parentNode.replaceChild(nuevoBtn, btnDescargarPizarras);
                        
                        nuevoBtn.addEventListener('click', async () => {
                            const tarjetas = document.querySelectorAll('.tarjeta-oculta');
                            const originalText = nuevoBtn.innerHTML;
                            nuevoBtn.innerHTML = '<i class="bi bi-hourglass-split mr-1"></i> Generando...';
                            nuevoBtn.disabled = true;

                            for (let i = 0; i < tarjetas.length; i++) {
                                try {
                                    const canvas = await html2canvas(tarjetas[i], {
                                        scale: 2, 
                                        useCORS: true, 
                                        backgroundColor: null 
                                    });
                                    const link = document.createElement('a');
                                    link.download = `Menu_Dia_BarEspanol_${i + 1}.jpg`;
                                    link.href = canvas.toDataURL('image/jpeg', 0.9);
                                    link.click();
                                    await new Promise(r => setTimeout(r, 600)); 
                                } catch (e) {
                                    console.error(e);
                                    alert("Error al capturar. Asegurate de tener buena conexión.");
                                }
                            }
                            nuevoBtn.innerHTML = originalText;
                            nuevoBtn.disabled = false;
                        });
                    }
                }

                // --- 2. DIBUJAR EL RESTO DEL MENÚ (A ESTOS SÍ SE LES APLICA EL RECARGO) ---
                if (regularItems.length > 0) {
                    tituloMenuResto.style.display = 'block'; 
                    
                    const itemsByCategory = regularItems.reduce((acc, item) => {
                        if (!acc[item.categoria]) acc[item.categoria] = [];
                        acc[item.categoria].push(item);
                        return acc;
                    }, {});

                    Object.keys(itemsByCategory).sort((a, b) => itemsByCategory[b].length - itemsByCategory[a].length).forEach(category => {
                        const header = document.createElement('div');
                        header.className = 'category-separator';
                        header.innerHTML = `<span class="category-title">${category}</span>`;
                        restoMenuContainer.appendChild(header);
                        
                        const catContainer = document.createElement('div');
                        catContainer.className = 'bg-gray-900 bg-opacity-50 rounded-lg shadow-lg mb-6';
                        restoMenuContainer.appendChild(catContainer);

                        itemsByCategory[category].forEach(item => {
                            // A los ítems regulares sí les sumamos el 10% de recargo
                            const precioMenu = calcularPrecioMenu(item.precio);
                            catContainer.innerHTML += `
                                <div class="menu-item p-4 flex justify-between items-start">
                                    <div>
                                        <h3 class="text-lg font-semibold text-white">${item.nombreLimpio}</h3>
                                        ${item.descripcion ? `<p class="text-sm text-gray-400 mt-1">${item.descripcion}</p>` : ''}
                                    </div>
                                    <p class="text-lg font-semibold text-white whitespace-nowrap ml-4">$${precioMenu.toLocaleString('es-AR')}</p>
                                </div>
                            `;
                        });
                    });
                }
            }
        });
    </script>
</body>
</html>
