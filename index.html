<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Menú - Bar español</title>
    <link rel="icon" href="https://i.postimg.cc/HkfvptWY/bar-logo-OPTM.png" type="image/png">
    
    <script src="https://cdn.tailwindcss.com"></script>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    
    <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@600&family=Kalam:wght@700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

    <style>
        :root {
            --bg-color: #121212;
            --text-color: #e0e0e0;
            --primary-accent: #FFC857;
            --border-color: #333;
        }
        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Inter', sans-serif;
        }
        
        .header-container {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 0.25rem;
            margin-bottom: 2rem;
        }
        .header-logo {
            height: 140px; 
            margin-bottom: 0.5rem;
            border-radius: 16px; 
        }
        .main-title {
            font-family: 'Playfair Display', serif;
            font-size: 2.25rem;
            font-weight: 700;
            color: #ffffff;
            letter-spacing: 0.1em;
            text-shadow: 1px 1px 3px rgba(0,0,0,0.3);
        }
        .header-subtitle {
            font-family: 'Inter', sans-serif;
            font-size: 0.9rem;
            font-weight: 400;
            color: var(--text-color);
            letter-spacing: 0.05em;
            margin-top: -0.25rem;
        }

        .menu-title {
            font-family: 'Playfair Display', serif;
            font-size: 2rem;
            font-weight: 700;
            color: #ffffff;
            letter-spacing: 0.08em;
            text-align: center;
            margin-top: 3rem;
            margin-bottom: 1rem;
        }

        .category-separator {
            text-align: center;
            margin-top: 2.5rem;
            margin-bottom: 1.5rem;
        }
        .category-separator::after {
            content: '';
            display: block;
            width: 150px;
            height: 20px;
            margin: 0.5rem auto 0;
            background-image: url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 10"><path d="M0 5 Q 25 0, 50 5 T 100 5" stroke="%23FFC857" stroke-width="1" fill="none" /></svg>');
            background-repeat: no-repeat;
            background-position: center;
        }
        .category-title {
            font-family: 'Playfair Display', serif;
            font-size: 1.75rem;
            font-weight: 700;
            color: var(--primary-accent);
        }

        .menu-item {
            border-bottom: 1px solid var(--border-color);
        }
        .menu-item:last-child {
            border-bottom: none;
        }

        .header-text {
            border: 1px solid var(--border-color);
            background-color: rgba(30, 30, 30, 0.5);
            padding: 1rem;
            border-radius: 0.75rem;
            font-size: 0.95rem;
            line-height: 1.6;
            text-align: center;
            color: #fafafa;
        }
        .wapp-button {
            display: inline-block;
            color: #25D366;
            font-weight: 700;
            font-size: 1.05rem;
            text-decoration: underline;
            transition: opacity 0.2s;
        }
        .wapp-button:hover {
            opacity: 0.8;
        }

        .footer-link {
            text-decoration: underline;
            color: #ffffff;
            font-weight: 600;
            transition: color 0.2s;
        }
        .footer-link:hover {
            color: var(--primary-accent);
        }
    </style>
</head>
<body class="antialiased">

    <div class="container mx-auto p-6 max-w-2xl">
        <header>
            <div class="header-container">
                <img src="https://i.postimg.cc/HkfvptWY/bar-logo-OPTM.png" alt="Logo Bar Español" class="header-logo">
                <h1 class="main-title">Bar Español</h1>
                <p class="header-subtitle">Desde 1981</p>
            </div>
            
            <div id="home-text-container" class="mt-4 text-gray-300"></div>
        </header>

        <h2 class="menu-title">Menú</h2>
        
        <div id="promo-text-container" class="mb-8 text-gray-300"></div>

        <div id="descargarEstadosBtnContainer" class="text-center my-4" style="display: none;">
            <button id="btnDescargarEstados" class="bg-yellow-500 hover:bg-yellow-600 text-black font-bold py-2 px-6 rounded-lg shadow-lg flex items-center justify-center mx-auto transition-transform hover:scale-105">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="currentColor" class="bi bi-download mr-2" viewBox="0 0 16 16">
                    <path d="M.5 9.9a.5.5 0 0 1 .5.5v2.5a1 1 0 0 0 1 1h12a1 1 0 0 0 1-1v-2.5a.5.5 0 0 1 1 0v2.5a2 2 0 0 1-2 2H2a2 2 0 0 1-2-2v-2.5a.5.5 0 0 1 .5-.5z"/>
                    <path d="M7.646 11.854a.5.5 0 0 0 .708 0l3-3a.5.5 0 0 0-.708-.708L8.5 10.293V1.5a.5.5 0 0 0-1 0v8.793L5.354 8.146a.5.5 0 1 0-.708.708l3 3z"/>
                </svg>
                Generar Imágenes para WhatsApp
            </button>
        </div>

        <main id="menu-container">
        </main>

        <footer class="text-center mt-12 text-gray-500 text-sm">
            <p class="text-xs text-white mb-2">
                Hecho por Vanto. ¿Queres tambien un menu editable/QR para tu comercio? 
                <a href="https://wa.me/541123920404?text=Hola,%20me%20interesa%20un%20menu%20QR" target="_blank" rel="noopener noreferrer" class="footer-link">Hablemos</a>
            </p>
            <p>© 2026 Bar español. Todos los derechos reservados.</p>
        </footer>
    </div>

    <div id="moldeEstado" style="position: absolute; left: -9999px; width: 400px; height: 711px; background-image: url('https://i.postimg.cc/fRF1yD25/plantilla-bar.jpg'); background-size: cover; background-position: center; display: flex; flex-direction: column; justify-content: center; align-items: center;">
        <div id="platosEstado" style="width: 100%; text-align: center; padding: 0 20px; margin-top: -50px;">
            </div>
        <div style="position: absolute; bottom: 120px; width: 100%; text-align: center; font-family: 'Caveat', cursive; font-size: 1.3rem; color: #e0e0e0; letter-spacing: 1px; text-shadow: 2px 2px 4px rgba(0,0,0,0.8);">
            * Promoción válida abonando en efectivo
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const googleSheetURL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSMWnEuTjdtdA0g2eXvOPJu5AzgbTnbnrkimQlN_BrnT3dmu5ze1Oz-cuCaEp2GfdSNPqVbxrG8AYUz/pub?output=csv';
            const menuContainer = document.getElementById('menu-container');
            
            // Variable global para guardar los platos y usarlos al descargar
            let globalItems = [];

            const CACHE_KEY = 'barEspanol_menuData';
            const CACHE_TIME_KEY = 'barEspanol_menuTimestamp';
            const CACHE_DURATION_MS = 15 * 60 * 1000; 

            fetchMenuData();

            async function fetchMenuData() {
                menuContainer.innerHTML = `<p class="text-center text-gray-400">Cargando menú...</p>`;
                
                try {
                    const now = new Date().getTime();
                    const cachedData = sessionStorage.getItem(CACHE_KEY);
                    const cachedTimestamp = sessionStorage.getItem(CACHE_TIME_KEY);

                    if (cachedData && cachedTimestamp && (now - parseInt(cachedTimestamp)) < CACHE_DURATION_MS) {
                        const { items, promoText, principalText, segundoText } = JSON.parse(cachedData);
                        globalItems = items;
                        renderHeaderText(promoText, principalText, segundoText);
                        renderMenu(items);
                        prepararBotonDescarga(items);
                        return; 
                    }

                    const urlConCacheBuster = `${googleSheetURL}&timestamp=${now}`;
                    const response = await fetch(urlConCacheBuster);
                    if (!response.ok) throw new Error('No se pudo cargar la información del menú.');
                    
                    let csvText = await response.text();
                    csvText = csvText.replace(/^\uFEFF/, '');
                    
                    const { items, promoText, principalText, segundoText } = parseCSV(csvText);
                    globalItems = items;
                    
                    sessionStorage.setItem(CACHE_KEY, JSON.stringify({ items, promoText, principalText, segundoText }));
                    sessionStorage.setItem(CACHE_TIME_KEY, now.toString());

                    renderHeaderText(promoText, principalText, segundoText);
                    renderMenu(items);
                    prepararBotonDescarga(items);

                } catch (error) {
                    console.error('Error:', error);
                    menuContainer.innerHTML = `<p class="text-center text-red-500 font-bold">${error.message}</p>`;
                }
            }

            function parseCSV(text) {
                const lines = text.trim().split(/\r?\n/);
                const headers = lines[0].split(',').map(h => h.trim().toLowerCase().replace(/"/g, ''));
                
                const nameIndex = headers.indexOf('nombre');
                const priceIndex = headers.indexOf('precio');
                const categoryIndex = headers.indexOf('categoria');
                const descriptionIndex = headers.indexOf('descripcion');
                const promoIndex = headers.indexOf('promo_text');
                const publicadoIndex = headers.indexOf('publicado_web');
                const principalIndex = headers.indexOf('principalhome_text');
                const segundoIndex = headers.indexOf('segundohome_text');
                
                if (nameIndex === -1 || priceIndex === -1) {
                    throw new Error(`Error: No se encontraron las columnas 'nombre' y/o 'precio'.`);
                }
                
                const parseCsvLine = (line) => { 
                    const values = []; 
                    let current = ''; 
                    let inQuotes = false; 
                    for (const char of line) { 
                        if (char === '"' && !inQuotes) { 
                            inQuotes = true; 
                        } else if (char === '"' && inQuotes) { 
                            inQuotes = false; 
                        } else if (char === ',' && !inQuotes) { 
                            values.push(current); 
                            current = ''; 
                        } else { 
                            current += char; 
                        } 
                    } 
                    values.push(current); 
                    return values.map(v => v.trim()); 
                };
                
                const firstDataLineValues = lines.length > 1 ? parseCsvLine(lines[1]) : [];
                const promoText = promoIndex !== -1 ? firstDataLineValues[promoIndex] : '';
                const principalText = principalIndex !== -1 ? firstDataLineValues[principalIndex] : '';
                const segundoText = segundoIndex !== -1 ? firstDataLineValues[segundoIndex] : '';
                
                const items = lines.slice(1).map(line => { 
                    const values = parseCsvLine(line); 
                    const nombre = values[nameIndex] || ''; 
                    const precio = parseFloat(values[priceIndex]); 
                    const categoria = values[categoryIndex] || 'Varios'; 
                    const descripcion = values[descriptionIndex] || ''; 
                    const publicado = publicadoIndex !== -1 ? values[publicadoIndex]?.toLowerCase() : ''; 
                    
                    if (nombre && !isNaN(precio)) { 
                        return { nombre, precio, categoria, descripcion, publicado_web: publicado }; 
                    } 
                    return null; 
                }).filter(item => item && item.publicado_web !== 'x');
                
                return { items, promoText, principalText, segundoText };
            }
            
            function renderHeaderText(promo, principal, segundo) {
                const promoContainer = document.getElementById('promo-text-container');
                const homeContainer = document.getElementById('home-text-container');

                if (promo) {
                    const formattedPromo = promo.replace(/\|/g, '<br>');
                    promoContainer.innerHTML = `<div class="header-text">${formattedPromo}</div>`;
                }

                if (principal || segundo) {
                    let htmlContent = '<div class="header-text">';
                    if (principal) {
                        const parts = principal.split('|');
                        parts.forEach(part => {
                            const currentPart = part.trim();
                            const numberMatch = currentPart.match(/(\d{10,})/);
                            if (numberMatch && currentPart.toLowerCase().includes('whatsapp')) {
                                const number = numberMatch[0];
                                const whatsappUrl = `https://wa.me/54${number}`;
                                const whatsappLink = `<a href="${whatsappUrl}" target="_blank" rel="noopener noreferrer" class="wapp-button">Whatsapp</a>`;
                                const finalHtml = currentPart.replace(/whatsapp/i, whatsappLink);
                                htmlContent += `<p class="mb-2">${finalHtml}</p>`;
                            } else {
                                htmlContent += `<p class="mb-2">${currentPart}</p>`;
                            }
                        });
                    }
                    if (segundo) {
                        const linksParts = segundo.split('|');
                        const linkRegex = /\[([^\]]+)\]\((https?:\/\/[^\)]+)\)/;
                        let appsHtml = '<div class="flex flex-wrap justify-center items-center gap-4 mt-4">';
                        linksParts.forEach(part => {
                            const match = part.trim().match(linkRegex);
                            if (match) {
                                const brandName = match[1].trim();
                                const url = match[2].trim();
                                let iconUrl = '';
                                const brandLower = brandName.toLowerCase();
                                
                                if (brandLower.includes('pedido') || brandLower.includes('peya')) {
                                    iconUrl = 'https://images.seeklogo.com/logo-png/36/1/pedidos-ya-logo-png_seeklogo-369550.png';
                                } else if (brandLower.includes('rappi')) {
                                    iconUrl = 'https://static.wikia.nocookie.net/logopedia/images/f/fd/Rappi.png/revision/latest?cb=20200212213348&path-prefix=es';
                                } else if (brandLower.includes('mercado') || brandLower.includes('mp')) {
                                    iconUrl = 'https://http2.mlstatic.com/storage/pog-cm-admin/calm-assets/3_C_fondoB--320x208--049529b9--rebrand-mp.webp?refresh=1';
                                }

                                if (iconUrl) {
                                    appsHtml += `
                                        <a href="${url}" target="_blank" rel="noopener noreferrer" class="transition-transform hover:scale-110">
                                            <img src="${iconUrl}" alt="${brandName}" referrerpolicy="no-referrer" class="h-10 md:h-12 w-auto object-contain rounded-md shadow-sm bg-white p-1">
                                        </a>`;
                                } else {
                                    appsHtml += `<a href="${url}" target="_blank" rel="noopener noreferrer" class="text-white underline font-semibold">${brandName}</a>`;
                                }
                            }
                        });
                        appsHtml += '</div>';
                        htmlContent += appsHtml;
                    }
                    htmlContent += '</div>';
                    homeContainer.innerHTML = htmlContent;
                }
            }
            
            function calcularPrecioMenu(precioNeto) {
                const precioBruto = precioNeto / 0.9;
                const resto = Math.floor(precioBruto) % 100;
                const base = Math.floor(precioBruto / 100) * 100;
                if (resto > 50) return base + 100;
                if (resto > 0) return base + 50;
                return base;
            }

            function renderMenu(items) {
                menuContainer.innerHTML = '';
                if (items.length === 0) {
                    menuContainer.innerHTML = `<p class="text-center text-gray-400">No hay items en el menú para mostrar.</p>`;
                    return;
                }

                // Separar Menú del Día del resto
                const menuDiaItems = [];
                const regularItems = [];

                items.forEach(item => {
                    if (item.nombre.includes('*MENU DIA*')) {
                        // Limpiamos el nombre para que el cliente no lea "*MENU DIA*"
                        item.nombreLimpio = item.nombre.replace('*MENU DIA*', '').trim();
                        menuDiaItems.push(item);
                    } else {
                        item.nombreLimpio = item.nombre;
                        regularItems.push(item);
                    }
                });
                
                // --- RENDERIZAR MENÚ DEL DÍA PRIMERO (Si hay) ---
                if (menuDiaItems.length > 0) {
                    crearCategoriaHTML('Menú del Día', menuDiaItems);
                }

                // --- RENDERIZAR EL RESTO DE CATEGORÍAS ---
                const itemsByCategory = regularItems.reduce((acc, item) => {
                    if (!acc[item.categoria]) acc[item.categoria] = [];
                    acc[item.categoria].push(item);
                    return acc;
                }, {});

                Object.keys(itemsByCategory).sort((a, b) => itemsByCategory[b].length - itemsByCategory[a].length).forEach(category => {
                    crearCategoriaHTML(category, itemsByCategory[category]);
                });
            }

            function crearCategoriaHTML(categoryTitleText, itemsArray) {
                const categoryHeader = document.createElement('div');
                categoryHeader.className = 'category-separator';
                const categoryTitle = document.createElement('span');
                categoryTitle.className = 'category-title';
                categoryTitle.textContent = categoryTitleText;
                
                // Si es Menú del Día, le ponemos un color especial
                if(categoryTitleText === 'Menú del Día') categoryTitle.style.color = '#fff';

                categoryHeader.appendChild(categoryTitle);
                menuContainer.appendChild(categoryHeader);
                
                const categoryContainer = document.createElement('div');
                categoryContainer.className = 'bg-gray-900 bg-opacity-50 rounded-lg shadow-lg mb-6';
                menuContainer.appendChild(categoryContainer);

                itemsArray.forEach(item => {
                    const precioMenu = calcularPrecioMenu(item.precio);
                    const itemElement = document.createElement('div');
                    itemElement.className = 'menu-item p-4 flex justify-between items-start';
                    itemElement.innerHTML = `
                        <div>
                            <h3 class="text-lg font-semibold text-white">${item.nombreLimpio}</h3>
                            ${item.descripcion ? `<p class="text-sm text-gray-400 mt-1">${item.descripcion}</p>` : ''}
                        </div>
                        <p class="text-lg font-semibold text-white whitespace-nowrap ml-4">$${precioMenu.toLocaleString('es-AR')}</p>
                    `;
                    categoryContainer.appendChild(itemElement);
                });
            }

            // --- LÓGICA DE CAPTURA DE ESTADOS DE WHATSAPP ---
            function prepararBotonDescarga(items) {
                const platosMenuDia = items.filter(plato => plato.nombre.includes('*MENU DIA*'));
                const btnContainer = document.getElementById('descargarEstadosBtnContainer');
                
                // Si hay platos del día, mostramos el botón
                if (platosMenuDia.length > 0) {
                    btnContainer.style.display = 'block';
                } else {
                    btnContainer.style.display = 'none';
                }
            }

            document.getElementById('btnDescargarEstados').addEventListener('click', async () => {
                const platosMenuDia = globalItems.filter(plato => plato.nombre.includes('*MENU DIA*'));
                
                if (platosMenuDia.length === 0) return;

                // Dividir en grupos de 2 (Chunking)
                const gruposDePlatos = [];
                for (let i = 0; i < platosMenuDia.length; i += 2) {
                    gruposDePlatos.push(platosMenuDia.slice(i, i + 2));
                }

                const molde = document.getElementById('moldeEstado');
                const contenedorPlatos = document.getElementById('platosEstado');
                const btn = document.getElementById('btnDescargarEstados');
                
                const originalHtml = btn.innerHTML;
                btn.innerHTML = 'Generando imágenes... ⏳';
                btn.disabled = true;

                for (let i = 0; i < gruposDePlatos.length; i++) {
                    const grupo = gruposDePlatos[i];
                    contenedorPlatos.innerHTML = ''; // Limpiamos la pizarra
                    
                    grupo.forEach(plato => {
                        const nombreLimpio = plato.nombre.replace('*MENU DIA*', '').trim();
                        // El precio que mostramos en la placa es el final (con recargo) tal cual pidió el cliente
                        const precioMenu = calcularPrecioMenu(plato.precio); 
                        
                        contenedorPlatos.innerHTML += `
                            <div style="margin-bottom: 30px; font-family: 'Kalam', cursive; color: white; text-shadow: 2px 2px 4px rgba(0,0,0,0.8);">
                                <div style="font-size: 2.2rem; line-height: 1.1;">${nombreLimpio}</div>
                                <div style="font-size: 1.8rem; color: #FFC857;">$${precioMenu.toLocaleString('es-AR')}</div>
                            </div>
                        `;
                    });

                    // Le damos un momento al navegador para que dibuje las letras
                    await new Promise(resolve => setTimeout(resolve, 300));

                    try {
                        const canvas = await html2canvas(molde, {
                            scale: 2, // Mejora la calidad de la foto
                            useCORS: true, // Permite cargar la imagen de postimg
                            backgroundColor: null
                        });

                        const link = document.createElement('a');
                        link.download = `Menu_del_Dia_BarEspanol_${i + 1}.jpg`;
                        link.href = canvas.toDataURL('image/jpeg', 0.9);
                        link.click();
                        
                        // Esperamos un segundito entre descargas si hay más de una foto
                        await new Promise(resolve => setTimeout(resolve, 500));
                        
                    } catch (error) {
                        console.error("Error al generar la imagen:", error);
                        alert("Hubo un problema al generar la imagen. Intentá desde otro dispositivo o navegador.");
                    }
                }
                
                btn.innerHTML = originalHtml;
                btn.disabled = false;
            });
        });
    </script>
</body>
</html>
